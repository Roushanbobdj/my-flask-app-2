<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .page-wrapper{
            max-width:1100px;
            margin:40px auto;
            background:#ffffff;
            border-radius:14px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:15px;
            margin-bottom:25px;
        }

        .header-actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .filter-bar{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-bottom:20px;
        }

        select, button{
            padding:10px 14px;
            border-radius:8px;
            border:1px solid #d1d5db;
            font-size:14px;
        }

        .summary{
            margin:20px 0;
            font-size:18px;
            font-weight:600;
            color:#111827;
        }

        .table-wrapper{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:10px;
        }

        th, td{
            padding:12px 14px;
            border-bottom:1px solid #e5e7eb;
            text-align:left;
            font-size:14px;
        }

        th{
            background:#f9fafb;
            font-weight:600;
            color:#374151;
        }

        .badge{
            background:#eef2ff;
            color:#4338ca;
            padding:4px 10px;
            border-radius:20px;
            font-size:12px;
            font-weight:600;
        }

        .amount{
            font-weight:600;
            color:#059669;
        }

        .btn{
            background:#e5e7eb;
            color:#111827;
            border:none;
            cursor:pointer;
            font-weight:600;
        }

        .btn-primary{
            background:#4f46e5;
            color:#fff;
            border:none;
            cursor:pointer;
            font-weight:600;
        }

        .btn-secondary{
            background:#10b981;
            color:#fff;
            border:none;
            cursor:pointer;
            font-weight:600;
        }

        .btn:hover,
        .btn-primary:hover,
        .btn-secondary:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- HEADER -->
    <div class="header">
        <h2>💼 Expense Dashboard</h2>

        <div class="header-actions">
            <a href="{{ url_for('export_expenses_excel') }}" class="btn btn-secondary">
                📥 Export Excel
            </a>

            <a href="{{ url_for('add_expense') }}" class="btn btn-primary">
                ➕ Add Expense
            </a>
        </div>
    </div>

    <!-- FILTER -->
    <form method="GET" class="filter-bar">
        <select name="month">
            <option value="">Month</option>
            {% for m in range(1,13) %}
            <option value="{{ m }}">{{ m }}</option>
            {% endfor %}
        </select>

        <select name="year">
            {% for y in range(2023, 2035) %}
            <option value="{{ y }}">{{ y }}</option>
            {% endfor %}
        </select>

        <button class="btn">🔍 Filter</button>
    </form>

    <!-- SUMMARY -->
    <div class="summary">
        <h3>💰 Total Expense: ₹ {{ total_expense }}</h3>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Title</th>
                    <th>Amount</th>
                    <th>Payment</th>
                </tr>
            </thead>
            <tbody>
                {% for e in expenses %}
                <tr>
                    <td>{{ e.date }}</td>
                    <td><span class="badge">{{ e.category }}</span></td>
                    <td>{{ e.title }}</td>
                    <td class="amount">₹ {{ e.amount }}</td>
                    <td>{{ e.payment_mode }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" style="text-align:center;padding:20px;color:#6b7280;">
                        ❌ No expenses found
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
