{% extends "base.html" %}
{% block content %}

<style>
.social-container{
    max-width:900px;
    margin:auto;
}

.social-card{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.social-card h3{
    margin-bottom:20px;
    font-weight:600;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    font-size:13px;
    margin-bottom:6px;
    color:#374151;
}

.form-group input{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:14px;
}

.btn{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}

.btn-primary{
    background:#4f46e5;
    color:white;
}

.btn-primary:hover{
    background:#3730a3;
}

.social-list{
    list-style:none;
    padding:0;
}

.social-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px;
    border-radius:12px;
    background:#f9fafb;
    border:1px solid #e5e7eb;
    margin-bottom:10px;
}

.social-left{
    display:flex;
    gap:10px;
    align-items:center;
}

.status{
    font-size:13px;
    font-weight:500;
}

.status.active{
    color:#16a34a;
}

.status.inactive{
    color:#dc2626;
}

@media(max-width:600px){
    .social-item{
        flex-direction:column;
        align-items:flex-start;
        gap:6px;
    }
}
</style>

<div class="social-container">

    <!-- ADD SOCIAL LINK -->
    <div class="social-card">
        <h3>🔗 Manage Social Media Links</h3>

        <form method="POST">
            <div class="form-group">
                <label>Platform Name</label>
                <input name="name" placeholder="Facebook / Instagram" required>
            </div>

            <div class="form-group">
                <label>Icon (emoji or fa-icon)</label>
                <input name="icon" placeholder="📘 or fa-facebook" required>
            </div>

            <div class="form-group">
                <label>Profile URL</label>
                <input name="url" placeholder="https://facebook.com/yourpage" required>
            </div>

            <button class="btn btn-primary">➕ Add Link</button>
        </form>
    </div>

    <!-- SOCIAL LINKS LIST -->
    <div class="social-card">
        <h3>📋 Existing Links</h3>

        <ul class="social-list">
        {% for l in links %}
            <li class="social-item">
                <div class="social-left">
                    <strong>{{ l.icon }}</strong>
                    <div>
                        <div>{{ l.name }}</div>
                        <small style="color:#6b7280;">{{ l.url }}</small>
                    </div>
                </div>

                {% if l.is_active %}
                    <span class="status active">● Active</span>
                {% else %}
                    <span class="status inactive">● Disabled</span>
                {% endif %}
            </li>
        {% endfor %}
        </ul>
    </div>

</div>

{% endblock %}
