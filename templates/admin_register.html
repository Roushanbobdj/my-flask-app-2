{% extends "base.html" %}
{% block content %}

<style>
/* ===== CARD ===== */
.register-card{
    max-width:560px;
    margin:40px auto;
    background:white;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,.12);
    overflow:hidden;
}

/* ===== HEADER ===== */
.register-header{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    padding:25px;
    color:white;
    text-align:center;
}

.register-header h2{
    font-weight:600;
    letter-spacing:.5px;
}

/* ===== BODY ===== */
.register-body{
    padding:30px;
}

.form-group{
    margin-bottom:16px;
    text-align:left;
}

.form-group label{
    font-size:13px;
    font-weight:500;
    color:#374151;
    display:block;
    margin-bottom:6px;
}

.form-control{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:14px;
    transition:.25s;
}

.form-control:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* ===== TWO COLUMN ===== */
.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

/* ===== PASSWORD ===== */
.password-wrap{
    position:relative;
}

.show-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:#e5e7eb;
    padding:5px 10px;
    font-size:12px;
    border-radius:6px;
    cursor:pointer;
}

/* ===== BUTTON ===== */
.submit-btn{
    width:100%;
    margin-top:20px;
    padding:13px;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    border:none;
    color:white;
    font-weight:600;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(37,99,235,.35);
}

/* ===== FLASH ===== */
.alert{
    padding:10px 14px;
    border-radius:8px;
    margin-bottom:14px;
    font-size:13px;
}

.alert-success{ background:#dcfce7;color:#166534; }
.alert-danger{ background:#fee2e2;color:#991b1b; }

/* ===== MOBILE ===== */
@media(max-width:600px){
    .row{ grid-template-columns:1fr; }
}
</style>

<div class="register-card">

    <!-- HEADER -->
    <div class="register-header">
        <h2>📝 Register New Student</h2>
        <p style="font-size:13px;opacity:.9;">Add student to reading room system</p>
    </div>

    <!-- BODY -->
    <div class="register-body">

        <!-- FLASH -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label>Student Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Timing From</label>
                    <input type="time" name="timing_from" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Timing To</label>
                    <input type="time" name="timing_to" class="form-control" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Monthly Fee (₹)</label>
                    <input type="number" name="monthly_fee" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Seat Number</label>
                    <input type="text" name="seat_number" class="form-control">
                </div>
            </div>

            <div class="form-group password-wrap">
                <label>Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
                <button type="button" class="show-btn" onclick="togglePassword()">Show</button>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="form-control">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Student Photo</label>
                <input type="file" name="photo" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="submit-btn">Register Student</button>

        </form>
    </div>
</div>

<script>
function togglePassword(){
    const p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}
</script>

{% endblock %}
