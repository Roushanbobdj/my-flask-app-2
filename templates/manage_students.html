{% extends "base.html" %}
{% block content %}

<style>
    .page-card {
        max-width: 1000px;
        margin: 30px auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
    }

    .page-header h2 {
        color: #4f46e5;
        font-weight: 600;
        margin: 0;
    }

    .search-input {
        padding: 10px 14px;
        width: 260px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        outline: none;
        transition: 0.2s;
    }

    .search-input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 12px;
    }

    thead {
        background: #4f46e5;
        color: white;
    }

    th, td {
        padding: 14px;
        text-align: center;
        font-size: 14px;
    }

    tbody tr {
        border-bottom: 1px solid #e5e7eb;
        transition: background 0.2s;
    }

    tbody tr:hover {
        background: #f9fafb;
    }

    .badge-active {
        color: #166534;
        background: #dcfce7;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
    }

    .badge-inactive {
        color: #7f1d1d;
        background: #fee2e2;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
    }

    .btn {
        padding: 6px 12px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
        color: white;
        margin: 2px;
        display: inline-block;
    }

    .btn-reset {
        background: #f59e0b;
    }

    .btn-delete {
        background: #ef4444;
    }
</style>

<div class="page-card">

    <!-- HEADER -->
    <div class="page-header">
        <h2>👨‍🎓 Registered Students</h2>

        <!-- SEARCH BAR -->
        <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by Name or Admission No..."
            onkeyup="searchStudent()"
        >
    </div>

    <!-- TABLE -->
    <table id="studentsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Admission No</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.id }}</td>

                <!-- ADD CLASS FOR SEARCH -->
                <td class="student-name">{{ s.name }}</td>
                <td class="admission-no">{{ s.admission_number }}</td>

                <td>
                    {% if s.is_active %}
                        <span class="badge-active">Active</span>
                    {% else %}
                        <span class="badge-inactive">Blocked</span>
                    {% endif %}
                </td>

                <td>
                    <a href="{{ url_for('admin_view_student_profile', student_id=s.id) }}"
                       class="btn"
                       style="background:#3b82f6;">
                        View
                    </a>
                    <a href="{{ url_for('reset_password', id=s.id) }}" class="btn btn-reset">
                        Reset
                    </a>

                    <a href="{{ url_for('delete_student', id=s.id) }}"
                       class="btn btn-delete"
                       onclick="return confirm('Are you sure you want to remove this student?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

<!-- SEARCH SCRIPT -->
<script>
function searchStudent() {
    let input = document.getElementById("searchInput").value.toUpperCase();
    let table = document.getElementById("studentsTable");
    let rows = table.getElementsByTagName("tr");

    for (let i = 1; i < rows.length; i++) {
        let nameCell = rows[i].getElementsByClassName("student-name")[0];
        let admissionCell = rows[i].getElementsByClassName("admission-no")[0];

        if (nameCell && admissionCell) {
            let nameText = nameCell.textContent || nameCell.innerText;
            let admissionText = admissionCell.textContent || admissionCell.innerText;

            if (
                nameText.toUpperCase().includes(input) ||
                admissionText.toUpperCase().includes(input)
            ) {
                rows[i].style.display = "";
            } else {
                rows[i].style.display = "none";
            }
        }
    }
}
</script>

{% endblock %}
