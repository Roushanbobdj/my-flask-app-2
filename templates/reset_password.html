{% extends "base.html" %}
{% block content %}

<style>
.reset-wrap{
    max-width:420px;
    margin:70px auto;
    padding:0 15px;
}

.reset-card{
    background:white;
    padding:35px 30px;
    border-radius:18px;
    box-shadow:0 20px 45px rgba(0,0,0,.08);
}

.reset-card h2{
    text-align:center;
    margin-bottom:6px;
    font-weight:600;
    color:#111827;
}

.reset-card .subtitle{
    text-align:center;
    font-size:14px;
    color:#6b7280;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:16px;
}

.form-group label{
    display:block;
    font-size:14px;
    font-weight:500;
    color:#374151;
    margin-bottom:6px;
}

.reset-card input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    font-size:15px;
    transition:.2s;
}

.reset-card input:focus{
    outline:none;
    border-color:#4f46e5;
    box-shadow:0 0 0 3px rgba(79,70,229,.15);
}

.show-btn{
    font-size:13px;
    color:#4f46e5;
    cursor:pointer;
    user-select:none;
}

.show-btn:hover{
    text-decoration:underline;
}

.reset-card button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:#4f46e5;
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:.3s;
}

.reset-card button:hover{
    background:#3730a3;
}
</style>

<div class="reset-wrap">
    <div class="reset-card">

        <h2>🔐 Reset Password</h2>
        <div class="subtitle">
            Student: <strong>{{ student.name }}</strong>
        </div>

        <form method="POST">

            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
            </div>

            <div class="form-group">
                <span class="show-btn" onclick="togglePassword()">👁 Show / Hide Password</span>
            </div>

            <button type="submit">Update Password</button>

        </form>
    </div>
</div>

<script>
function togglePassword(){
    const p1 = document.getElementById("new_password");
    const p2 = document.getElementById("confirm_password");

    const type = p1.type === "password" ? "text" : "password";
    p1.type = type;
    p2.type = type;
}
</script>

{% endblock %}
