{% extends "base.html" %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#6366f1,#3b82f6);
min-height:100vh;
font-family: 'Poppins', sans-serif;
}

.notification-card{
max-width:600px;
margin:auto;
margin-top:50px;
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.page-title{
font-size:24px;
font-weight:700;
margin-bottom:20px;
text-align:center;
color:#111827;
}

.form-label{
font-weight:600;
}

.form-select,
.form-control{
border-radius:10px;
padding:12px;
}

.btn-send{
background:linear-gradient(135deg,#6366f1,#3b82f6);
border:none;
border-radius:12px;
padding:12px;
font-weight:600;
width:100%;
transition:.3s;
}

.btn-send:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.counter{
font-size:12px;
text-align:right;
color:#6b7280;
}

.success-box{
background:#dcfce7;
color:#166534;
padding:10px;
border-radius:8px;
margin-bottom:15px;
animation:fadeIn .5s ease;
}

/* WhatsApp Button */

.whatsapp-btn{

display:block;
margin-top:20px;
text-align:center;
background:#25D366;
color:white;
padding:14px;
border-radius:50px;
font-weight:600;
text-decoration:none;
transition:.3s;
box-shadow:0 8px 18px rgba(0,0,0,.15);
animation:popIn .6s ease;
}

.whatsapp-btn:hover{

transform:scale(1.05);
box-shadow:0 12px 25px rgba(0,0,0,.25);
color:white;

}

@keyframes popIn{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

/* Mobile Responsive */

@media(max-width:576px){

.notification-card{

margin:20px;
padding:20px;

}

.page-title{
font-size:20px;
}

}

</style>

<div class="container">

<div class="notification-card">

<div class="page-title">
📢 Send Notification
</div>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="success-box">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">

<label class="form-label">Select Student</label>

<select name="student_id" class="form-select" required>

<option value="all">Send To All Students</option>

{% for student in students %}

<option value="{{student.id}}">
{{student.name}} (ID: {{student.id}})
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label class="form-label">Message</label>

<textarea 
name="message"
class="form-control"
rows="4"
maxlength="200"
placeholder="Write your notification..."
onkeyup="countChar(this)"
required></textarea>

<div class="counter">
<span id="charCount">0</span>/200
</div>

</div>

<button class="btn-send">
🚀 Send Notification
</button>

</form>

<!-- WhatsApp Group Button -->

<a href="https://chat.whatsapp.com/YOUR_GROUP_LINK" 
target="_blank"
class="whatsapp-btn">

📱 Open Library WhatsApp Group

</a>

</div>

</div>

<script>

function countChar(val){
let len = val.value.length
document.getElementById("charCount").innerText = len
}

</script>

{% endblock %}
