{% extends "base.html" %}
{% block content %}

<style>
.auth-wrap{
    max-width:420px;
    margin:70px auto;
    padding:0 15px;
}

.auth-card{
    background:white;
    padding:35px 30px;
    border-radius:18px;
    box-shadow:0 20px 45px rgba(0,0,0,.08);
}

.auth-card h2{
    margin-bottom:8px;
    text-align:center;
    font-weight:600;
    color:#111827;
}

.auth-card .subtitle{
    text-align:center;
    font-size:14px;
    color:#6b7280;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:16px;
}

.form-group label{
    display:block;
    font-size:14px;
    font-weight:500;
    color:#374151;
    margin-bottom:6px;
}

.auth-card input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    font-size:15px;
    transition:.2s;
}

.auth-card input:focus{
    outline:none;
    border-color:#4f46e5;
    box-shadow:0 0 0 3px rgba(79,70,229,.15);
}

.auth-card button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#4f46e5;
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:.3s;
}

.auth-card button:hover{
    background:#3730a3;
}

.auth-card p{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    color:#6b7280;
}

.auth-card a{
    color:#4f46e5;
    text-decoration:none;
    font-weight:500;
}

.auth-card a:hover{
    text-decoration:underline;
}
</style>

<div class="auth-wrap">
    <div class="auth-card">

        <h2>📝 Create Account</h2>
        <div class="subtitle">
            Register a new student account
        </div>

        <form method="POST">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create password" required>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <p>
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </p>

    </div>
</div>

{% endblock %}
